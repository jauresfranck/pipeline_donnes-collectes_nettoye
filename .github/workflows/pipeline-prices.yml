name: Mise à jour quotidienne (Prix + Sentiments)

on:
  schedule:
    - cron: '0 19 * * 1-5'  # 19h UTC = 20h FR
  workflow_dispatch: # Permet de lancer manuellement le script

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    
    # ✅ Cette permission est CRUCIALE : elle autorise le push sans token personnel
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Installation des librairies classiques + celles pour l'IA NLP de votre partenaire
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install yfinance tiingo pandas sqlalchemy psycopg2-binary tabulate transformers torch requests

      # ÉTAPE 1 : Votre pipeline (Prix, MACD, RSI -> Supabase)
      - name: Run Market Data Pipeline
        env:
          TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
          DB_URL: ${{ secrets.DB_URL }}
        run: python donne_collectes_nettoye.py

      # ÉTAPE 2 : Le pipeline NLP (Articles, FinBERT -> Supabase)
      - name: Run News Sentiment Pipeline
        env:
          DB_URL: ${{ secrets.DB_URL }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
        # ⚠️ ATTENTION : Remplacez "analyse_sentiment.py" par le vrai nom du fichier de votre partenaire s'il est différent !
        run: python analyse_sentiment.py

      # ÉTAPE 3 : Sauvegarde des historiques CSV sur le dépôt
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data
          # On vérifie s'il y a des changements avant de commit pour éviter une erreur
          if git diff --staged --quiet; then
            echo "Aucun changement à committer."
          else
            git commit -m "Auto: update prix et sentiments $(date -u +'%Y-%m-%d %H:%M:%S')"
            git push
          fi
